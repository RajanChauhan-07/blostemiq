---
apiVersion: v1
kind: Namespace
metadata:
  name: blostemiq
  labels:
    name: blostemiq
    environment: dev
---
# ─── Resource Quotas — prevent runaway spend ─────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: blostemiq-quota
  namespace: blostemiq
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
---
# ─── Default resource limits ─────────────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: blostemiq-limits
  namespace: blostemiq
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
