---
# ─── NGINX Ingress → routes /api/* → services ─────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blostemiq-ingress
  namespace: blostemiq
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # WebSocket support for notification-service
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: "blostemiq.ddns.net"
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001

          - path: /api/partners
            pathType: Prefix
            backend:
              service:
                name: partner-service
                port:
                  number: 3002

          - path: /api/ingest
            pathType: Prefix
            backend:
              service:
                name: partner-service
                port:
                  number: 3002

          - path: /api/ml
            pathType: Prefix
            backend:
              service:
                name: ml-service
                port:
                  number: 8001

          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3004

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
