replicaCount: 2

image:
  repository: 279867549867.dkr.ecr.us-east-1.amazonaws.com/blostemiq-notification-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3004

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  NODE_ENV: production
  PORT: "3004"
  LOG_LEVEL: info
  AWS_REGION: us-east-1
  ALLOWED_ORIGINS: "https://blostemiq.com,http://localhost:3000"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

probe:
  path: /health
  port: 3004
