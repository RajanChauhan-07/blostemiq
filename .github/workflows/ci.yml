name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: us-east-1

jobs:
  # ─── Lint & Test: Node.js Services ───────────────────────
  test-node:
    name: Test Node.js Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, partner-service, notification-service, billing-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --workspace=apps/${{ matrix.service }}
      - name: Lint
        run: npm run lint --workspace=apps/${{ matrix.service }} --if-present
      - name: Test
        run: npm run test --workspace=apps/${{ matrix.service }} --if-present

  # ─── Lint & Test: Python Services ────────────────────────
  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [analytics-service, ml-serving, outreach-service, lead-scoring-service, report-engine]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd apps/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Lint
        run: |
          pip install ruff
          ruff check apps/${{ matrix.service }}
      - name: Test
        run: |
          cd apps/${{ matrix.service }}
          pytest tests/ -v --if-present 2>/dev/null || true

  # ─── Frontend Build ───────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --workspace=apps/frontend
      - name: Type check
        run: npm run type-check --workspace=apps/frontend --if-present
      - name: Lint
        run: npm run lint --workspace=apps/frontend --if-present
      - name: Build
        run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.blostemiq.com
          NEXT_PUBLIC_WS_URL: wss://ws.blostemiq.com
          NEXTAUTH_URL: https://app.blostemiq.com
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

  # ─── Build & Push Docker Images to ECR ───────────────────
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test-node, test-python, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        service:
          - name: frontend
            context: apps/frontend
          - name: auth-service
            context: apps/auth-service
          - name: partner-service
            context: apps/partner-service
          - name: analytics-service
            context: apps/analytics-service
          - name: ml-serving
            context: apps/ml-serving
          - name: outreach-service
            context: apps/outreach-service
          - name: notification-service
            context: apps/notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-blostemiq
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/blostemiq-${{ matrix.service.name }}:latest
            ${{ steps.login-ecr.outputs.registry }}/blostemiq-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to EKS via ArgoCD ─────────────────────────────
  deploy:
    name: Deploy to EKS (dev)
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-blostemiq
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name blostemiq-dev --region ${{ env.AWS_REGION }}
      - name: Update image tags in Helm values
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" k8s/helm/values-dev.yaml
          git config --local user.email "ci@blostemiq.com"
          git config --local user.name "CI Bot"
          git add k8s/helm/values-dev.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push origin main
