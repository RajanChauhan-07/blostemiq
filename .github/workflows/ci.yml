name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 279867549867.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: blostemiq-cluster
  NAMESPACE: blostemiq

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Lint & Build ────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Frontend — Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: ML Service — Lint
        working-directory: backend/ml-service
        run: |
          pip install -r requirements.txt
          python -c "from src.main import app; print('✅ ML Service imports OK')"

      - name: Lead Scoring — Lint
        working-directory: backend/lead-scoring-service
        run: |
          pip install -r requirements.txt
          python -c "from src.main import app; print('✅ Lead Scoring imports OK')"

      - name: Outreach Service — Lint
        working-directory: backend/outreach-service
        run: |
          pip install -r requirements.txt
          python -c "from src.main import app; print('✅ Outreach Service imports OK')"

  # ─── Docker Build & Push ─────────────────────────
  build-and-push:
    name: Build & Push to ECR
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: frontend, path: frontend, ecr: blostemiq-frontend }
          - { name: ml-service, path: backend/ml-service, ecr: blostemiq-ml-serving }
          - { name: lead-scoring, path: backend/lead-scoring-service, ecr: blostemiq-lead-scoring }
          - { name: outreach, path: backend/outreach-service, ecr: blostemiq-outreach }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          TAG=${{ github.sha }}
          docker build -f ${{ matrix.service.path }}/Dockerfile.dev \
            -t $ECR_REGISTRY/${{ matrix.service.ecr }}:$TAG \
            -t $ECR_REGISTRY/${{ matrix.service.ecr }}:latest \
            ${{ matrix.service.path }}
          docker push $ECR_REGISTRY/${{ matrix.service.ecr }}:$TAG
          docker push $ECR_REGISTRY/${{ matrix.service.ecr }}:latest

  # ─── Deploy to EKS ──────────────────────────────
  deploy:
    name: Deploy to EKS
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Deploy all services
        run: |
          TAG=${{ github.sha }}
          
          helm upgrade --install frontend k8s/helm/frontend \
            --namespace $NAMESPACE --set "image.tag=$TAG" --set "image.pullPolicy=Always"
          
          helm upgrade --install ml-service k8s/helm/ml-service \
            --namespace $NAMESPACE --set "image.tag=$TAG" --set "image.pullPolicy=Always"
          
          helm upgrade --install lead-scoring-service k8s/helm/lead-scoring-service \
            --namespace $NAMESPACE --set "image.tag=$TAG" --set "image.pullPolicy=Always"
          
          helm upgrade --install outreach-service k8s/helm/outreach-service \
            --namespace $NAMESPACE --set "image.tag=$TAG" --set "image.pullPolicy=Always"
          
          echo "✅ All services deployed with tag: $TAG"

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/frontend -n $NAMESPACE --timeout=120s
          kubectl rollout status deployment/ml-service -n $NAMESPACE --timeout=120s
          kubectl get pods -n $NAMESPACE
