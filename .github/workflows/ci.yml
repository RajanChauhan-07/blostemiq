name: BlostemIQ CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─── Lint & Type-check ─────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/auth-service/package-lock.json
            backend/partner-service/package-lock.json
            backend/notification-service/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Type check frontend
        run: npx tsc --noEmit
        working-directory: frontend

  # ─── Build & Push Docker images to ECR ─────────────────
  build-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write  # OIDC
      contents: read

    strategy:
      matrix:
        service:
          - { name: auth-service,         path: backend/auth-service,         ecr: auth-service }
          - { name: partner-service,       path: backend/partner-service,       ecr: partner-service }
          - { name: notification-service,  path: backend/notification-service,  ecr: notification-service }
          - { name: frontend,              path: frontend,                      ecr: frontend }

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/blostemiq-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push ${{ matrix.service.name }}
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/blostemiq-dev-${{ matrix.service.ecr }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.ECR_REGISTRY }}/blostemiq-dev-${{ matrix.service.ecr }}:latest

          docker build -t $IMAGE_URI -t $IMAGE_LATEST \
            -f ${{ matrix.service.path }}/Dockerfile.dev \
            ${{ matrix.service.path }}

          docker push $IMAGE_URI
          docker push $IMAGE_LATEST

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
        id: build

  # ─── Deploy to EKS ─────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/blostemiq-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name blostemiq-dev --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.4'

      - name: Deploy Auth Service
        run: |
          helm upgrade --install auth-service k8s/helm/auth-service \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ env.ECR_REGISTRY }}/blostemiq-dev-auth-service \
            --namespace blostemiq --create-namespace \
            --wait --timeout 5m

      - name: Deploy Partner Service
        run: |
          helm upgrade --install partner-service k8s/helm/partner-service \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ env.ECR_REGISTRY }}/blostemiq-dev-partner-service \
            --namespace blostemiq \
            --wait --timeout 5m

      - name: Deploy Notification Service
        run: |
          helm upgrade --install notification-service k8s/helm/notification-service \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ env.ECR_REGISTRY }}/blostemiq-dev-notification-service \
            --namespace blostemiq \
            --wait --timeout 5m

      - name: Deploy Frontend
        run: |
          helm upgrade --install frontend k8s/helm/frontend \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ env.ECR_REGISTRY }}/blostemiq-dev-frontend \
            --namespace blostemiq \
            --wait --timeout 5m

      - name: Verify deployments
        run: |
          kubectl get pods -n blostemiq
          kubectl get services -n blostemiq
