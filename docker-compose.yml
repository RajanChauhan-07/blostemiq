# BlostemIQ — Local Development Stack
# Usage: docker compose up -d

version: '3.9'

services:
  # ─── Data Stores ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blostemiq
      POSTGRES_USER: blostemiq
      POSTGRES_PASSWORD: blostemiq_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blostemiq"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Backend Services ────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://blostemiq:blostemiq_dev_2026@postgres:5432/blostemiq
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-blostemiq-2026
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  partner-service:
    build:
      context: ./backend/partner-service
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://blostemiq:blostemiq_dev_2026@postgres:5432/blostemiq
      REDIS_URL: redis://redis:6379
      PORT: "3002"
    depends_on:
      postgres:
        condition: service_healthy

  ml-service:
    build:
      context: ./backend/ml-service
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      LOG_LEVEL: INFO

  lead-scoring-service:
    build:
      context: ./backend/lead-scoring-service
      dockerfile: Dockerfile.dev
    ports:
      - "8002:8002"
    environment:
      PORT: "8002"
      LOG_LEVEL: INFO

  outreach-service:
    build:
      context: ./backend/outreach-service
      dockerfile: Dockerfile.dev
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
      BYTEZ_API_KEY: ${BYTEZ_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      LOG_LEVEL: INFO

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile.dev
    ports:
      - "3004:3004"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3004"
    depends_on:
      redis:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_WS_URL: http://localhost:3004
    depends_on:
      - auth-service
      - partner-service
      - ml-service

volumes:
  pgdata:
  redis_data:
